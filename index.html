<!DOCTYPE html>
<html>
<head>
    <title>Bestie Quotes 💬</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .bar {
            width: 250px;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: black;
            animation: load 2.5s linear forwards;
        }

        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>

<body>

<div id="container">
    <h1 id="text">Loading bestie quotes...</h1>

    <div class="bar">
        <div class="progress"></div>
    </div>
</div>

<script>
    setTimeout(() => {
        document.getElementById("text").innerText = "Happy April Fools Di 😂";
    }, 2500);
</script>

</body>
</html>
